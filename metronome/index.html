<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metronome</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f0f0f0;
        }

        h1 {
            margin-bottom: 30px;
        }

        select,
        button {
            font-size: 18px;
            padding: 10px 15px;
            margin: 10px;
        }

        #beat {
            font-size: 100px;
            margin-top: 30px;
            color: #ff3b3b;
        }
    </style>
</head>

<body>

    <h1>Metronome</h1>

    <label for="bpm">Choose BPM:</label>
    <select id="bpm">
        <option value="60">60 BPM</option>
        <option value="70">70 BPM</option>
        <option value="80">80 BPM</option>
        <option value="90">90 BPM</option>
        <option value="100">100 BPM</option>
        <option value="110">110 BPM</option>
        <option value="120">120 BPM</option>
        <option value="130">130 BPM</option>
        <option value="140">140 BPM</option>
        <option value="150">150 BPM</option>
    </select>

    <br>
    <button id="startStop">Start</button>

    <div id="beat">●</div>

    <script>
        let isRunning = false;
        let intervalId;
        let audioCtx = null;

        const bpmSelect = document.getElementById('bpm');
        const startStopBtn = document.getElementById('startStop');
        const beatDiv = document.getElementById('beat');

        function playClick() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.frequency.value = 1000; // 1kHz beep
            gainNode.gain.value = 1;

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.05); // 50ms beep
        }

        function tick() {
            // Flash visual beat
            beatDiv.style.color = '#333';
            setTimeout(() => beatDiv.style.color = '#ff3b3b', 100);
            playClick();
        }

        startStopBtn.addEventListener('click', () => {
            if (!isRunning) {
                const bpm = parseInt(bpmSelect.value);
                const interval = 60000 / bpm;
                tick(); // play immediately
                intervalId = setInterval(tick, interval);
                startStopBtn.textContent = 'Stop';
                isRunning = true;
            } else {
                clearInterval(intervalId);
                startStopBtn.textContent = 'Start';
                isRunning = false;
                beatDiv.style.color = '#ff3b3b';
            }
        });
    </script>

</body>

</html>
